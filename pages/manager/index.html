<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bilibili Push Manager</title>
    <link rel="stylesheet" href="./style.css?v=manager-redesign" />
    <link rel="stylesheet" href="./layout.css?v=manager-redesign" />
    <link rel="stylesheet" href="./overview.css?v=manager-redesign" />
    <link rel="stylesheet" href="./subscriptions.css?v=manager-redesign" />
    <link rel="stylesheet" href="./accounts.css?v=manager-redesign" />
  </head>
  <body>
    <main class="page-shell">
      <aside class="side-rail" aria-label="manager navigation">
        <div class="brand-mark" aria-hidden="true"><span></span></div>
        <nav class="tabs" aria-label="manager views">
          <button class="tab active" type="button" data-tab="overview"><span class="tab-mark"></span>概览</button>
          <button class="tab" type="button" data-tab="subscriptions"><span class="tab-mark"></span>订阅</button>
          <button class="tab" type="button" data-tab="accounts"><span class="tab-mark"></span>账号</button>
          <button class="tab" type="button" data-tab="pending"><span class="tab-mark"></span>Pending</button>
        </nav>
      </aside>

      <section class="app-main">
        <header class="topbar">
          <div>
            <p class="eyebrow">Bilibili Push</p>
            <h1>管理面板</h1>
          </div>
          <div class="topbar-actions">
            <button class="ghost-button refresh-button" id="refreshButton" type="button">刷新</button>
          </div>
        </header>

        <section class="metrics" id="metrics"></section>

        <section class="toolbar" id="subscriptionToolbar">
          <input id="searchInput" type="search" placeholder="筛选 UID、UP 主或会话" />
          <select id="typeFilter" aria-label="订阅类型">
            <option value="all">全部类型</option>
            <option value="dynamic">动态</option>
            <option value="live">直播</option>
          </select>
        </section>

        <section class="panel active" id="overviewPanel"></section>
        <section class="panel" id="subscriptionsPanel"></section>
        <section class="panel" id="accountsPanel"></section>
        <section class="panel" id="pendingPanel"></section>
      </section>
    </main>

    <div class="toast" id="toast" hidden></div>
    <script type="module" src="./app.js"></script>
  </body>
</html>
